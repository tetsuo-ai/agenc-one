# Layer configuration for meta-agenc
BBPATH .= ":${LAYERDIR}"

BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "meta-agenc"
BBFILE_PATTERN_meta-agenc = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-agenc = "10"

LAYERDEPENDS_meta-agenc = "core raspberrypi openembedded-layer meta-python networking-layer"
LAYERSERIES_COMPAT_meta-agenc = "scarthgap styhead"
